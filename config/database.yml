default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: sports_scope_development

test:
  <<: *default
  database: sports_scope_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "sports_scope_production") %>
  username: <%= ENV.fetch("DATABASE_USER", "sports_scope") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
