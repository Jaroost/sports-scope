    turn_anomaly:
      title: "Suspicious turn detection"
      help: "As you edit, the builder flags waypoints with several sharp turns bunched up within a small radius — usually a sign of a waypoint dropped off the road. It also flags u-turns, which betray a waypoint dropped on a dead end. Roundabouts, and junctions you merely ride through, are ignored. A smaller value cuts false alarms on switchback trails (hiking, MTB)."
      diameter: "Diameter of the analysed area"
    snap_warn:
      title: "Off-path waypoint detection"
      help: "Routing follows the paths OpenStreetMap knows about: with no path where you clicked, a waypoint is pulled onto the nearest way and the route drifts from what you intended. The builder flags waypoints whose gap to the resulting route exceeds this distance. A larger value cuts alerts where map data is sparse (trails), at the cost of missing moderate drifts."
      distance: "Gap that triggers a warning"
