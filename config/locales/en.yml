    load:
      title: "Fitness & fatigue"
      intro: "Your training load over time, across all sports. Three metrics to steer progression and recovery."
      how_title: "How to read these curves?"
      how_body: "Each session earns a stress score (TSS). From it we derive a slow-moving fitness (CTL, 42d) and a fast-reacting fatigue (ATL, 7d). Their difference is your daily freshness (TSB). Goal: raise fitness while managing fatigue, and let freshness rebound before a goal event."
      today: "Today"
      today_state: "State that day"
      detail_hint: "Hover the chart to see another day"
      detail_rest: "No session that day"
      ctl_label: "Fitness"
      ctl_sub: "CTL · 42 days"
      ctl_help: "Your accumulated training level. Rises slowly with consistent training — this is your progression."
      atl_label: "Fatigue"
      atl_sub: "ATL · 7 days"
      atl_help: "Your recent fatigue. Reacts fast to a hard training block."
      tsb_label: "Freshness"
      tsb_sub: "TSB = Fitness − Fatigue"
      tsb_help: "Fresh or tired today? Positive = rested, negative = carrying fatigue."
      trend_tooltip: "Trend over the last 7 days"
      acwr_label: "Load ratio"
      acwr_sub: "ACWR · 7 d / 28 d"
      acwr_help: "Compares your recent load (7 d) to your usual load (28 d). Sweet spot 0.8–1.3: you build fitness without overloading."
      acwr_pending: "Not enough history yet (28 days needed) to compute the ratio."
      acwr_detraining: "Undertraining"
      acwr_optimal: "Optimal"
      acwr_caution: "Caution"
      acwr_high_risk: "High risk"
      acwr_detraining_hint: "Ratio < 0.8: recent load is low versus usual — you're recovering, or risk detraining if it lasts."
      acwr_optimal_hint: "Ratio 0.8–1.3: healthy build, load under control. This is the zone to aim for."
      acwr_caution_hint: "Ratio 1.3–1.5: load is ramping fast. Watch fatigue and recovery."
      acwr_high_risk_hint: "Ratio > 1.5: load spiked too sharply — higher injury risk. Ease off for a few days."
      zones_title: "Freshness zones (TSB)"
      zone_very_fresh: "Very fresh / tapered"
      zone_fresh: "Fresh — ready for a goal"
      zone_neutral: "Neutral — maintaining"
      zone_productive: "Building — useful fatigue"
      zone_overreaching: "Overreaching — mind recovery"
      zone_very_fresh_hint: "TSB > +20: very rested. Great right before a race; too long here and you lose fitness."
      zone_fresh_hint: "TSB +5 to +20: rested and sharp, good to perform."
      zone_neutral_hint: "TSB −10 to +5: balanced load, holding steady."
      zone_productive_hint: "TSB −30 to −10: accumulating fatigue to progress. Normal mid-block."
      zone_overreaching_hint: "TSB < −30: high fatigue, overreaching risk — recover."
      axis_load: "Load (CTL / ATL)"
      axis_tsb: "Freshness (TSB)"
      range_3m: "3 months"
      range_6m: "6 months"
      range_12m: "12 months"
      range_all: "All"
      coverage: "TSS over %{total} activities: %{power} power · %{hr} HR · %{estimated} estimated"
      coverage_hint: "Without a sensor, TSS is estimated (duration × typical sport intensity) — less accurate."
      lthr_title: "HR threshold (for heart-rate TSS)"
      lthr_value: "%{bpm} bpm"
      lthr_label: "Manual HR threshold"
      seed_hint: "The first few weeks of the curve are a start-up artifact (fitness starts from zero)."
      week:
        title: "Your week"
        target: "Target ~%{tss} TSS"
        ramp_up: "to gain +%{ctl} fitness"
        ramp_flat: "to hold your fitness"
        ramp_down: "to ease off and recover"
        ramp_event: "based on your goal event's taper"
        progress: "%{done} / %{target} TSS"
        planned: "%{tss} TSS planned"
        remaining_to_plan: "~%{tss} TSS left to plan over %{days} d — ≈ %{duration} in endurance"
        done_label: "Target reached: anything more is a bonus."
        planner_title: "Plan your week"
        planner_help: "Pin your routes to a day: their estimated TSS shows up in orange on the bar."
        this_week: "This week"
        next_week: "Next week"
        remove_plan: "Remove from the week"
        search_route: "Search a route…"
        no_route: "No route"
        cancel: "Cancel"
        pace_ahead: "Ahead of your target"
        pace_on_track: "On target"
        pace_behind: "Behind your target"
        explain: "Target = 7 × your fitness (the TSS needed to hold it) + ~42 TSS per point of fitness gained, per your goal. It's anchored to Monday's fitness, so it won't move mid-week."
        explain_event: "During a build-up, the target follows your goal event's taper schedule rather than your generic goal."
      methods_title: "How are TSS and the HR threshold calculated?"
      tss_method_title: "TSS — a session's load"
      tss_method_formula: "TSS = duration (h) × IF² × 100, where IF (intensity factor) places the session relative to your threshold. Benchmark: 100 = exactly 1 h at your threshold."
      tss_method_intro: "IF comes from three methods, most to least reliable — the first that applies wins:"
      tss_method_power: "Power — IF = NP ÷ FTP at the ride's date. NP (normalized power) is a 30 s rolling average of your watts, raised to the 4th power, averaged, then the 4th root: it weighs surges more than a plain average."
      tss_method_hr: "Heart rate — IF = average HR ÷ HR threshold. Used when the activity has no power."
      tss_method_estimated: "Estimate — with no sensor at all, a typical intensity per sport: cycling 0.70 · running 0.75 · swimming 0.70 · ski 0.55 · hiking 0.50 · other 0.60."
      tss_method_cap: "IF is capped at 1.5: one bad data point can't blow up your load."
      lthr_method_title: "HR threshold (LTHR)"
      lthr_method_what: "It's your lactate threshold heart rate: the highest HR you can hold in a steady state for ~1 h of maximal effort. Below it, your body clears lactate as fast as it produces it; above it, lactate builds up and you fade within minutes. It's the heart-rate equivalent of FTP — hence its role as the denominator of IF above."
      lthr_method_manual: "If you set it, your value is used as-is — by far the most reliable. It's measured with a 30 min solo all-out test, keeping the average HR of the LAST 20 minutes: HR drifts upward early in the effort, so the full average would underrate you."
      lthr_method_auto: "Otherwise it's estimated from your history: the highest average HR across your activities ÷ 0.92 approximates your max HR, then LTHR ≈ 0.90 × max HR."
      lthr_method_auto_warning: "This estimate is rough: it starts from average HRs, never your real max HR. If your HR-based TSS looks wrong, set the threshold manually."
      no_data: "Not enough activities yet to chart your training load."
