      how_title: "What is FTP, and how is it estimated?"
      what_body: "It's the highest average power you can hold in a steady state for ~1 h. Below it, the effort stays sustainable for a long time; above it, fatigue accelerates and you're counting down in minutes. It's the watts counterpart of the HR threshold (LTHR) — and the denominator of the IF behind your TSS."
      how_body: "Your FTP is derived from your power-duration curve over a rolling 6-week window, keeping the highest value among the available methods: the Critical Power model fitted on your best 5 / 10 / 20 min (FTP ≈ 97% of CP), which works even without a 20-min test — a shorter hard effort is enough; otherwise 95% of your best genuine 20 min; or 98% of a sustained ~1 h effort if it's more telling."
