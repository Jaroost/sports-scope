        pace_ahead: "En avance sur ta cible"
        pace_on_track: "Dans la cible"
        pace_behind: "En retard sur ta cible"
        explain: "Cible = 7 × ta forme de fond (le TSS pour la maintenir) + le coût des points de forme visés par ton objectif : +5 pts en « progresser vite », +3 en « progresser lentement », à ~42 TSS le point (une constante, pas un réglage). Calée sur ta forme de lundi, elle ne bouge pas en cours de semaine."
        explain_event: "Pendant une prépa, la cible suit le schéma d'affûtage de ta sortie objectif plutôt que ton objectif générique."
      methods_title: "Comment sont calculés le TSS et le seuil FC ?"
      tss_method_title: "TSS — la charge d'une séance"
      tss_method_formula: "TSS = durée (h) × IF² × 100, où l'IF (facteur d'intensité) situe la séance par rapport à ton seuil. Repère : 100 = 1 h pile à ton seuil."
      tss_method_intro: "L'IF est obtenu par trois méthodes, de la plus fiable à la moins fiable — la première applicable l'emporte :"
      tss_method_power: "Puissance — IF = NP ÷ FTP de la date de la sortie. La NP (puissance normalisée) est la moyenne mobile 30 s de tes watts, élevée à la puissance 4, moyennée, puis racine 4e : elle pèse les à-coups plus que la moyenne simple."
      tss_method_hr: "Fréquence cardiaque — IF = FC moyenne ÷ seuil FC. Utilisé quand la sortie n'a pas de puissance."
      tss_method_estimated: "Estimation — sans aucun capteur, une intensité typique du sport : vélo 0,70 · course 0,75 · natation 0,70 · ski 0,55 · rando 0,50 · autre 0,60."
      tss_method_cap: "L'IF est plafonné à 1,5 : une donnée aberrante ne peut pas faire exploser ta charge."
      lthr_method_title: "Seuil FC (LTHR)"
      lthr_method_what: "C'est ta FC au seuil lactique : la fréquence cardiaque la plus haute que tu peux tenir en régime stable sur ~1 h d'effort maximal. En dessous, ton corps évacue le lactate aussi vite qu'il le produit ; au-dessus, il s'accumule et tu craques en quelques minutes. C'est l'équivalent cardiaque de la FTP — d'où son rôle de dénominateur de l'IF ci-dessus."
      lthr_method_manual: "Si tu le renseignes, ta valeur est utilisée telle quelle — de loin le plus fiable. On le mesure sur un test de 30 min à fond en solo, en gardant la FC moyenne des 20 DERNIÈRES minutes : la FC dérive à la hausse en début d'effort, la moyenne complète te sous-estimerait."
      lthr_method_auto: "Sinon il est estimé depuis ton historique : la plus haute FC moyenne de tes sorties ÷ 0,92 approxime ta FC max, puis LTHR ≈ 0,90 × FC max."
      lthr_method_auto_warning: "Cette estimation est grossière : elle part de FC moyennes, jamais de ta FC max réelle. Si ton TSS en FC te semble faux, renseigne ton seuil à la main."
