      if_hint: "<strong>Intensité de l'effort</strong> — à quel point tu es resté près de ton maximum tenable sur la durée.<br>~0,75 = allure tranquille (endurance) · 1,0 = à fond, ton seuil · au-delà = très violent, intenable longtemps."
      np: "Puissance normalisée (NP)"
      np_hint: "<strong>Puissance ressentie</strong> — les watts qui reflètent la vraie difficulté de l'effort, pas seulement la moyenne.<br>Les coups de force (relances, bosses) coûtent très cher au corps : la moyenne les gomme, cette mesure les compte.<br>Sortie régulière : quasi identique à la puissance moyenne · sortie hachée : nettement au-dessus.<br><small>Côté calcul : les moments forts sont élevés à la puissance 4 avant d'être moyennés — c'est ce qui pénalise les à-coups.</small>"
      vi: "Indice de variabilité (VI)"
      vi_hint: "<strong>Régularité de l'effort</strong> — un rythme lisse, ou plein d'à-coups ?<br>Repères selon le type de sortie :<ul><li>1,00–1,05 : très régulier (contre-la-montre, home-trainer)</li><li>1,05–1,15 : route roulante, peu de descentes</li><li>1,2–1,4 : longue sortie vallonnée (descentes, villages, relances)</li><li>1,25–1,5 : groupe, stop-and-go, VTT</li></ul>Un chiffre élevé vient surtout de la roue libre et des arrêts (0 W), pas forcément d'un effort violent."
      decoupling: "Découplage aérobie"
      decoupling_hint_power: "<strong>Tenue de l'effort</strong> — sur la 2e moitié de la sortie, ton cœur s'est-il emballé pour le même effort ?<br>Moins de 5 % = bonne endurance, tu tiens bien · beaucoup plus = tu as fatigué (ou chaleur, déshydratation)."
      decoupling_hint_pace: "<strong>Tenue de l'effort</strong> — sur la 2e moitié de la sortie, ton cœur s'est-il emballé pour la même allure ?<br>Moins de 5 % = bonne endurance, tu tiens bien · beaucoup plus = tu as fatigué (ou chaleur, déshydratation)."
