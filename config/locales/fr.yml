      how_body: "Chaque sortie rapporte un « stress » (TSS). On en tire une forme de fond qui monte lentement (CTL, 42 j) et une fatigue qui réagit vite (ATL, 7 j). Leur écart donne ta fraîcheur du jour (TSB). Objectif : faire monter la forme de fond tout en gérant la fatigue, et laisser la fraîcheur remonter avant un objectif."
