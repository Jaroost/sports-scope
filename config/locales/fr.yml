      what_body: "C'est la puissance moyenne la plus élevée que tu peux tenir en régime stable sur ~1 h. En dessous, l'effort reste soutenable longtemps ; au-dessus, la fatigue s'accélère et l'échéance se compte en minutes. C'est le pendant en watts du seuil FC (LTHR) — et le dénominateur de l'IF qui donne ton TSS."
      how_body: "Ta FTP est déduite de ta courbe puissance-durée, sur une fenêtre glissante de 6 semaines, en gardant la valeur la plus élevée parmi les méthodes possibles : le modèle Critical Power ajusté sur tes meilleurs 5 / 10 / 20 min (FTP ≈ 97 % de la CP), qui fonctionne même sans test de 20 min — un effort dur plus court suffit ; sinon 95 % de ton meilleur 20 min quand tu en as un vrai ; ou 98 % d'un effort soutenu d'~1 h s'il est plus révélateur."
