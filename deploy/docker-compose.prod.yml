name: sports-scope

x-traefik-defaults: &traefik-defaults
  traefik.enable: "true"
  traefik.docker.network: traefik-net

services:
  db:
    image: postgres:18.4
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sports_scope_production
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
      - ./postgres/init-keycloak.sh:/docker-entrypoint-initdb.d/init-keycloak.sh:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: keycloak/keycloak:latest
    restart: always
    entrypoint: ["/opt/keycloak/templates/docker-entrypoint.sh"]
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: https://${KEYCLOAK_HOST}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: https://${APP_HOST}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./keycloak:/opt/keycloak/templates:ro
    networks:
      - default
      - traefik-net
    depends_on:
      db:
        condition: service_healthy
    labels:
      <<: *traefik-defaults
      traefik.http.routers.keycloak.rule: "Host(`${KEYCLOAK_HOST}`)"
      traefik.http.routers.keycloak.entrypoints: web
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"

  rails:
    image: jaroost-server:5000/sports-scope:${IMAGE_TAG:-latest}
    restart: always
    entrypoint: ["docker-entrypoint-rails"]
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    environment:
      RAILS_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: sports_scope_production
      KEYCLOAK_BASE_URL: https://${KEYCLOAK_HOST}
      KEYCLOAK_REALM: sports-scope
      KEYCLOAK_CLIENT_ID: rails-app
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: https://${APP_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
    networks:
      - default
      - traefik-net
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      brouter:
        condition: service_healthy
    labels:
      <<: *traefik-defaults
      traefik.http.routers.rails.rule: "Host(`${APP_HOST}`)"
      traefik.http.routers.rails.entrypoints: web
      traefik.http.services.rails.loadbalancer.server.port: "3000"

  brouter:
    image: jaroost-server:5000/sports-scope-brouter:${BROUTER_IMAGE_TAG:-1.7.10}
    restart: always
    environment:
      BROUTER_XMX: ${BROUTER_XMX:-1500m}
      BROUTER_THREADS: ${BROUTER_THREADS:-4}
    volumes:
      - brouter_segments:/segments4
      - brouter_profiles:/profiles2
    networks:
      - default
      - traefik-net
    depends_on:
      # Le moteur n'est démarré qu'une fois les données exploitables (au moins une
      # tuile + lookups.dat). Bloquant uniquement au tout premier boot : le marqueur
      # vit dans le volume.
      brouter-sync:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:17777/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      <<: *traefik-defaults
      # Servi sous le domaine de l'app : même origine, donc pas de CORS ni de
      # certificat supplémentaire. La priorité explicite passe devant le router
      # `rails` (Host seul). Method(GET) neutralise l'endpoint d'upload de profil
      # (POST /brouter/profile) exposé par RouteServer — l'app ne fait que des GET.
      traefik.http.routers.brouter.rule: "Host(`${APP_HOST}`) && PathPrefix(`/brouter`) && Method(`GET`)"
      traefik.http.routers.brouter.priority: "100"
      traefik.http.routers.brouter.entrypoints: web
      traefik.http.services.brouter.loadbalancer.server.port: "17777"

  # Bootstrap + rafraîchissement des données de routage (tuiles .rd5, profils,
  # lookups.dat). Premier démarrage : ~3,4 Go pour l'Europe.
  brouter-sync:
    image: alpine:3.20
    restart: always
    environment:
      BROUTER_BBOX: ${BROUTER_BBOX:--30,30,45,70}
      BROUTER_SYNC_INTERVAL: ${BROUTER_SYNC_INTERVAL:-604800}
    volumes:
      - brouter_segments:/segments4
      - brouter_profiles:/profiles2
      - ./brouter/sync.sh:/sync.sh:ro
      - ./brouter/profiles:/profiles-overlay:ro
    entrypoint:
      - /bin/sh
      - -c
      - >
        apk add --no-cache bash curl coreutils >/dev/null &&
        while true; do bash /sync.sh; sleep "$$BROUTER_SYNC_INTERVAL"; done
    healthcheck:
      # « Sain » = il y a des données à servir. start_period couvre le premier
      # téléchargement (~3,4 Go) sans que les échecs comptent comme des retries.
      test: ["CMD-SHELL", "test -f /segments4/.sync-complete"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 7200s
    networks:
      - default

volumes:
  db_data:
  brouter_segments:
  brouter_profiles:

networks:
  default:
  traefik-net:
    external: true
