name: sports-scope

x-traefik-defaults: &traefik-defaults
  traefik.enable: "true"
  traefik.docker.network: proxy

services:
  db_app:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sports_scope_development
    volumes:
      - db_app_data:/var/lib/postgresql
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_keycloak:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - db_keycloak_data:/var/lib/postgresql
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: keycloak/keycloak:latest
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db_keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: https://keycloak.localtest.me
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: ${APP_HOST:-https://app.localtest.me}
    volumes:
      - ./compose/keycloak:/opt/keycloak/data/import:ro
    networks:
      - default
      - proxy
    depends_on:
      db_keycloak:
        condition: service_healthy
    labels:
      <<: *traefik-defaults
      traefik.http.routers.keycloak.rule: Host(`keycloak.localtest.me`)
      traefik.http.routers.keycloak.entrypoints: websecure
      traefik.http.routers.keycloak.tls: "true"
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"

  rails:
    build:
      context: .
      dockerfile: Dockerfile
    image: sports-scope-app
    restart: unless-stopped
    entrypoint: ["docker-entrypoint-rails"]
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db_app
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      VITE_RUBY_HOST: vite.localtest.me
      VITE_RUBY_PORT: 443
      VITE_RUBY_HTTPS: "true"
      VITE_RUBY_SKIP_COMPATIBILITY_CHECK: "true"
      KEYCLOAK_BASE_URL: https://keycloak.localtest.me
      KEYCLOAK_REALM: sports-scope
      KEYCLOAK_CLIENT_ID: rails-app
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: ${APP_HOST:-https://app.localtest.me}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      VITE_PUBLIC_HOST: vite.localtest.me
      EXTRA_CA_CERT: /etc/ssl/extra/traefik.crt
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/app/node_modules
      - /home/user/traefik-docker/certs/cert.pem:/etc/ssl/extra/traefik.crt:ro
    extra_hosts:
      - "keycloak.localtest.me:host-gateway"
      - "vite.localtest.me:host-gateway"
      - "app.localtest.me:host-gateway"
    networks:
      - default
      - proxy
    depends_on:
      db_app:
        condition: service_healthy
      keycloak:
        condition: service_started
    labels:
      <<: *traefik-defaults
      traefik.http.routers.rails.rule: Host(`app.localtest.me`)
      traefik.http.routers.rails.entrypoints: websecure
      traefik.http.routers.rails.tls: "true"
      traefik.http.services.rails.loadbalancer.server.port: "3000"

  vite:
    image: sports-scope-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["docker-entrypoint-vite"]
    command: ["bundle", "exec", "vite", "dev"]
    environment:
      RAILS_ENV: development
      VITE_RUBY_HOST: 0.0.0.0
      VITE_RUBY_PORT: 3036
      VITE_RUBY_SKIP_COMPATIBILITY_CHECK: "true"
      VITE_PUBLIC_HOST: vite.localtest.me
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/app/node_modules
    networks:
      - default
      - proxy
    depends_on:
      - rails
    labels:
      <<: *traefik-defaults
      traefik.http.routers.vite.rule: Host(`vite.localtest.me`)
      traefik.http.routers.vite.entrypoints: websecure
      traefik.http.routers.vite.tls: "true"
      traefik.http.services.vite.loadbalancer.server.port: "3036"

volumes:
  db_app_data:
  db_keycloak_data:
  bundle_cache:
  node_modules_cache:

networks:
  default:
  proxy:
    external: true
