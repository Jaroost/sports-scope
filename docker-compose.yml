name: sports-scope

x-traefik-defaults: &traefik-defaults
  traefik.enable: "true"
  traefik.docker.network: proxy

services:
  db:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sports_scope_development
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql
      - ./deploy/postgres/init-keycloak.sh:/docker-entrypoint-initdb.d/init-keycloak.sh:ro
    ports:
      - "5432:5432"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: keycloak/keycloak:latest
    restart: unless-stopped
    entrypoint: ["/opt/keycloak/templates/docker-entrypoint.sh"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: https://${KEYCLOAK_HOST:-keycloak.localtest.me}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: https://${APP_HOST:-app.localtest.me}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./deploy/keycloak:/opt/keycloak/templates:ro
    networks:
      - default
      - proxy
    depends_on:
      db:
        condition: service_healthy
    labels:
      <<: *traefik-defaults
      traefik.http.routers.keycloak.rule: "Host(`${KEYCLOAK_HOST:-keycloak.localtest.me}`)"
      traefik.http.routers.keycloak.entrypoints: websecure
      traefik.http.routers.keycloak.tls: "true"
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"

  rails:
    build:
      context: .
      dockerfile: Dockerfile
    image: sports-scope-app
    restart: unless-stopped
    entrypoint: ["docker-entrypoint-rails"]
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      VITE_RUBY_HOST: ${VITE_HOST:-vite.localtest.me}
      VITE_RUBY_PORT: 443
      VITE_RUBY_HTTPS: "true"
      KEYCLOAK_BASE_URL: https://${KEYCLOAK_HOST:-keycloak.localtest.me}
      KEYCLOAK_REALM: sports-scope
      KEYCLOAK_CLIENT_ID: rails-app
      RAILS_KEYCLOAK_CLIENT_SECRET: ${RAILS_KEYCLOAK_CLIENT_SECRET}
      APP_HOST: https://${APP_HOST:-app.localtest.me}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      VITE_PUBLIC_HOST: ${VITE_HOST:-vite.localtest.me}
      EXTRA_CA_CERT: /etc/ssl/extra/traefik.crt
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/app/node_modules
      - /home/user/traefik-docker/certs/cert.pem:/etc/ssl/extra/traefik.crt:ro
    extra_hosts:
      - "${KEYCLOAK_HOST:-keycloak.localtest.me}:host-gateway"
      - "${VITE_HOST:-vite.localtest.me}:host-gateway"
      - "${APP_HOST:-app.localtest.me}:host-gateway"
    networks:
      - default
      - proxy
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      vite:
        condition: service_started
    labels:
      <<: *traefik-defaults
      traefik.http.routers.rails.rule: "Host(`${APP_HOST:-app.localtest.me}`)"
      traefik.http.routers.rails.entrypoints: websecure
      traefik.http.routers.rails.tls: "true"
      traefik.http.services.rails.loadbalancer.server.port: "3000"

  vite:
    image: sports-scope-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["docker-entrypoint-vite"]
    command: ["pnpm", "vite", "dev"]
    environment:
      RAILS_ENV: development
      VITE_RUBY_HOST: 0.0.0.0
      VITE_RUBY_PORT: 3036
      VITE_PUBLIC_HOST: ${VITE_HOST:-vite.localtest.me}
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - node_modules_cache:/app/node_modules
    networks:
      - default
      - proxy
    labels:
      <<: *traefik-defaults
      traefik.http.routers.vite.rule: "Host(`${VITE_HOST:-vite.localtest.me}`)"
      traefik.http.routers.vite.entrypoints: websecure
      traefik.http.routers.vite.tls: "true"
      traefik.http.services.vite.loadbalancer.server.port: "3036"

volumes:
  db_data:
  bundle_cache:
  node_modules_cache:

networks:
  default:
  proxy:
    external: true
